services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: rag
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    ports:
      - "3307:3306"
    volumes:
      - rag_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - rag_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rag_minio
      MINIO_ROOT_PASSWORD: rag_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rag_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: alembic upgrade head
    env_file: .env
    environment: &app_environment
      DATABASE_URL: mysql+pymysql://rag:rag_password@mysql:3306/rag?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MILVUS_HOST: host.docker.internal
      MILVUS_PORT: "19530"
      STREAMLIT_API_URL: http://api:8000
      LANGSMITH_HIDE_INPUTS: "true"
      LANGSMITH_HIDE_OUTPUTS: "true"
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python scripts/bootstrap.py
    env_file: .env
    environment: *app_environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment: *app_environment
    ports:
      - "8000:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment: *app_environment
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      STREAMLIT_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rag_mysql_data:
  rag_redis_data:
  rag_minio_data:
